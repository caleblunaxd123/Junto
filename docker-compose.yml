services:
  postgres:
    image: postgres:16-alpine
    container_name: junto_postgres
    environment:
      POSTGRES_USER: junto_user
      POSTGRES_PASSWORD: junto_password
      POSTGRES_DB: junto_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U junto_user -d junto_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
